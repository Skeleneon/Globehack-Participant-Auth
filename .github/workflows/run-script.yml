name: Run QR Sender v2

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# 🔥 prevents multiple runs from corrupting previous_data.dat
concurrency:
  group: qr-sender
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # -----------------------------
      # CHECKOUT REPO
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git operations

      # -----------------------------
      # SETUP PYTHON
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # INSTALL DEPENDENCIES
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------
      # RUN SCRIPT
      # -----------------------------
      - name: Run QR sender
        env:
          DISCORD_KEY: ${{ secrets.DISCORD_KEY }}
          EMAIL_CHANNEL_ID: ${{ secrets.EMAIL_CHANNEL_ID }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python "qr code sender final.py"

      # -----------------------------
      # COMMIT STATE FILE (SAFE)
      # -----------------------------
      - name: Commit and push state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Add file if it exists
          if [ -f previous_data.dat ]; then
            git add previous_data.dat
          fi

          # Exit if no changes
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update previous_data.dat"

          # Pull latest changes safely
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin $BRANCH

          git push origin $BRANCH
