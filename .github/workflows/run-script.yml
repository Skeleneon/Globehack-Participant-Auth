name: Run QR Sender

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: qr-sender
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure folders exist
        run: mkdir -p qrs

      # 🔐 Inject ALL secrets properly
      - name: Run script
        env:
          DISCORD_KEY: ${{ secrets.DISCORD_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_CHANNEL_ID: ${{ secrets.EMAIL_CHANNEL_ID }}
        run: python "qr code sender final.py"

      - name: Commit and push previous_data.dat safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add previous_data.dat

          # skip commit if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update previous_data.dat"

          # safer sync before push
          git pull --rebase origin master || echo "No remote changes"

          git push origin master
