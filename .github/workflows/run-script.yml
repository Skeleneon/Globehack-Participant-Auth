name: Run QR Sender

on:
  schedule:
    - cron: "*/15 * * * *"   # change to */6 for every 6 minutes if needed
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT: allows pull/rebase safely

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure folders exist
        run: mkdir -p qrs

      - name: Run script
        run: python "qr code sender final.py"

      - name: Commit and push previous_data.dat safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Add file (ignore if unchanged)
          git add previous_data.dat

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update previous_data.dat"

          # 🔥 KEY FIX: sync with remote before pushing
          git pull --rebase origin master

          git push origin master
