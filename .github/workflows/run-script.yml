name: Run QR Sender

on:
  schedule:
    - cron: "*/5 * * * *"   # every 15 min (GitHub may delay slightly)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true   # 🔥 REQUIRED for git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure folders exist
        run: mkdir -p qrs

      - name: Run script
        run: python "qr code sender final.py"

      - name: Commit and push previous_data.dat safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add previous_data.dat

          # if nothing to commit, exit cleanly
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update previous_data.dat"
          git push origin HEAD
